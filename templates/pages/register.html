<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='temp_style.css') }}">
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <img src="{{ url_for('static', filename='JNTUH_logo.png') }}" alt="Logo">
            <h2>Registeration</h2>
        </div>

        <form action="/register" method="POST">
            <form>
                <label>Department</label>
                <input type="text" id="dept_name" name="dept_name" placeholder="Enter Department">

                <label>Department ID</label>
                <input type="text" id="dept_id" name="dept_id" placeholder="Enter Department ID">

                <label>HOD name</label>
                <input type="text" id="hod_name" name="hod_name" placeholder="Enter HOD name">

                <label>Technician name</label>
                <input type="text" id="tech_name" name="tech_name" placeholder="Enter Technician name">

                <label>Phone number(Techinican)</label>
                <input type="text" id="tech_phno" name="tech_phno" placeholder="Enter Phone number(Techinican)">

                <label>Phone number(HOD)</label>
                <input type="text" id="hod_phno" name="hod_phno" placeholder="Enter Phone number(HOD)"> 

                <label>Email ID(HOD)</label>
                <input type="email" id="email" name="email" placeholder="Enter Email ID(HOD)">

                <button onclick="sendCode()">Send Verification Code to Mail ID</button>
                
                <label>Enter Verification Code</label>
                <div style="display:flex; align-items:center; gap:1px;">
                    <span id="timerText" style="font-size:12px; color:gray;"></span>                   
                    <input type="password" id="otpInput" placeholder="Enter verification code">
                </div>

                <button id="verifyBtn" onclick="verifyCode()" style="width:220px;">Verify</button> 
                <button id="resendBtn" onclick="sendCode()" disabled style="margin-left:1px; width:220px;">Resend</button>
                
                <label>Set a Password</label>

                <div class="password-box">
                    <form action="/register" method="POST" onsubmit="return handleFormSubmit(event)">
                        <input type="password" id="password" oninput="validatePassword()" name="password" required>
                        <p id="password-hint" style="color: #ff4d4d; font-size: 0.8rem;"></p>
                        <span onclick="togglePassword()" class="show-btn">Show</span> 
                    </form>
                </div>
                <button onclick="registerUser()">Register and Login</button>
            </form>
        </form>
    </div>
<script>
let timer;
let timeLeft = 60;
// SEND CODE
function sendCode() {
    let email = document.getElementById("email").value;
    fetch("/send-code", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({email: email})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        if(data.message.toLowerCase().includes("sent")) {
            startTimer();
            document.getElementById("verifyBtn").disabled = false;
        }
    });
}
// VERIFY CODE
function verifyCode() {
    let email = document.getElementById("email").value;
    let code = document.getElementById("otpInput").value;
    fetch("/verify-code", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            code: code
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        clearInterval(timer);
        document.getElementById("timerText").textContent = "";
    });
}
// TIMER FUNCTION
function startTimer() {
    const resendBtn = document.getElementById("resendBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const timerText = document.getElementById("timerText");
    clearInterval(timer);
    timeLeft = 60;
    resendBtn.disabled = true;
    verifyBtn.disabled = false;
    timer = setInterval(() => {
        timerText.textContent = `(${timeLeft}s)`;
        timeLeft--;
        if(timeLeft < 0) {
            clearInterval(timer);
            timerText.textContent = "";
            verifyBtn.disabled = true;   // disable verify
            resendBtn.disabled = false;  // enable resend
        }
    }, 1000);
}
