<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='temp_style.css') }}">
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <img src="{{ url_for('static', filename='JNTUH_logo.png') }}" alt="Logo">
            <h2>Registeration</h2>
        </div>

        <form action="/register" method="POST">
            <form>
                <label>Department</label>
                <input type="text" id="dept" name="dept" placeholder="Enter Department">

                <label>Email ID(HOD)</label>
                <input type="email" id="email" name="email" placeholder="Enter Email ID">

                <label class="small-label">Phone number(Techinican)</label>
                <input type="text" id="phno2" name="phno2" placeholder="Enter Phone number(Techinican)">

                <div class="verification-section">
                    <div class="verification-inputs">
                        <label class="small-label">Phone number(HOD)</label>
                        <input type="text" id="phno1" name="phno1" placeholder="Enter Phone number(HOD)"> 
                       
                        <label class="small-label">Enter Verification Code</label>
                        <input type="password" id="otpInput" placeholder="Enter verification code">
                    </div>

                    <div class="verification-buttons">
                        <button class="opt-btn" onclick="sendCode()">Send Verification Code</button>
                        <button class="opt-btn" onclick="verifyCode()">Verify</button>
                    </div>

                </div>

                <label>Set a Password</label>

                <div class="password-box">
                    <form action="/register" method="POST" onsubmit="return handleFormSubmit(event)">
                        <input type="password" id="password" oninput="validatePassword()" name="password" required>
                        <p id="password-hint" style="color: #ff4d4d; font-size: 0.8rem;"></p>
                        <span onclick="togglePassword()" class="show-btn">Show</span> 
                    </form>
                </div>
                <button onclick="registerUser()">Register and Login</button>

            </form>
        </form>

    </div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
    
</body>
</html>
