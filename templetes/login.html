<!DOCTYPE html>
<html>
<head>
    <title>Faculty Notification System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <div class="header">
            <img src="https://tse4.mm.bing.net/th/id/OIP.emJcUHFDlmxaHocoh2tImQHaGA?pid=Api&P=0&h=180"
                 alt="JNTUH Logo"
                 class="logo">

            <h1>JNTUH - Faculty Notification System</h1>
        </div>

        <form id="loginForm">
            <input type="text" id="dept" placeholder="Department" required>
            <input type="text" id="hodPhone" placeholder="HOD Phone Number" required>
            <button type="button" onclick="generateOTP()" class="otp-btn">
        Generate OTP
    </button>
            <input type="password" id="otp" placeholder="Technician OTP" required>
            <button type="submit">LOGIN</button>
        </form>

        <p id="error" class="error"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
