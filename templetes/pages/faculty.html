<!DOCTYPE html>
<html lang="en">
<head>
    <title>Database Entry Table</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        input { width: 90%; padding: 5px; }
        .add-btn { background-color: #28a745; color: white; border: none; padding: 8px 15px; cursor: pointer; }
    </style>
    <link rel="stylesheet" href="main_style.css">
</head>
<body>

    <h2>Faculty Records</h2>
    <table id="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Faculty name</th>
                <th>Phone number</th>
                <th>Subject</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="faculty-table-body">
            </tbody>
        <tfoot>
            <tr>
                <td><input type="text" id="newName" placeholder="ID" required min="1"></td>
                <td><input type="text" id="newCategory" placeholder="Name of the faculty" required></td>
                <td><input type="text" id="newQty" placeholder="+91" maxlength="10" required></td>
                <td><input type="text" id="newSub" placeholder="Subject" required></td>
            </tr>
        </tfoot>
    </table>
    <div class="bottom-actions">
        
        <button class="btn edit-btn" onclick="loadFaculty()">Load data</button>
        <button class="btn add-btn" onclick="addData()">Add</button>
        <button class="btn upload-btn" onclick="uploadData()">Upload</button>
    </div>
<script src="script.js"></script>
</body>
</html>
