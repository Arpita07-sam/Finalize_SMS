<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main_style.css') }}">
</head>
<body>



        <div class="dashboard-container" style="display: flex;">
            <nav class="sidebar">
                <h2>AppLogo</h2>
                <!-- <ul>
                    <li><a href="#" class="active">Dashboard</a></li>
                    <li><a href="#" onclick="loadPage('/hod')">HOD</a></li>
                    <li><a href="#" onclick="loadPage('/faculty')">Faculty</a></li>
                    <li><a href="#" onclick="loadPage('/payment')">Payment</a></li>
                    <li><a href="#" onclick="loadPage('/history')">History</a></li>
                    <li><a href="#" onclick="loadPage('/setting')">Settings</a></li>
                </ul> -->
                <ul>
                    <li><a href="#" class="active" onclick="loadPage('dashboard', this)">Dashboard</a></li>
                    <li><a href="#" onclick="loadPage('/hod', this)">HOD</a></li>
                    <li><a href="#" onclick="loadPage('/faculty', this)">Faculty</a></li>
                    <li><a href="#" onclick="loadPage('/payment', this)">Payment</a></li>
                    <li><a href="#" onclick="loadPage('/history', this)">History</a></li>
                    <li><a href="#" onclick="loadPage('/setting', this)">Settings</a></li>
                </ul>
            </nav>

            <main class="main-content">
                <header>
                    <div class="logo">
                        <img src="{{ url_for('static', filename='JNTUH_logo.png') }}" alt="Logo">
                        
                        <h1>JNTUH FACULTY SMS NOTIFICATION SYSTEM</h1>
                    </div>
                    
                </header>
                <section class="content-area" id="content-area">
                    <div class="data-table">
                        <h3 class="page-header">Upload the image here</h3>

                        <div class="image-uploader-grid">
                            <div id="image-list" class="image-list-container"></div>

                            <label class="add-image-btn">
                                <span>+</span>
                                <input type="file" id="multi-upload" accept="image/*" multiple onchange="handleMultipleUpload(event)">
                            </label>
                        </div>
                        <br>
                        <p>Your latest project updates will appear here.</p>
                    </div>
                </section>
            </main>
        </div>

<script>

function loadPage(page) {

    const contentArea = document.getElementById("content-area");

    // default dashboard view
    if (page === "dashboard") {
        contentArea.innerHTML = `
            <div class="data-table">
                <h3 class="page-header">Upload the image here</h3>

                <div class="image-uploader-grid">
                    <div id="image-list" class="image-list-container"></div>

                    <label class="add-image-btn">
                        <span>+</span>
                        <input type="file" id="multi-upload" accept="image/*" multiple onchange="handleMultipleUpload(event)">
                    </label>
                </div>
                <br>
                <p>Your latest project updates will appear here.</p>
            </div>
        `;
        return;
    }

    // load external html inside dashboard
    fetch(page)
        .then(res => res.text())
        .then(data => {
            contentArea.innerHTML = data;
        })
        .catch(err => {
            contentArea.innerHTML = "<h2>Page not found</h2>";
        });
}

</script>
<script>
window.onload = () => loadPage("dashboard");
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
