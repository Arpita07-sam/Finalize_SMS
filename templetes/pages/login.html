<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="login-box">
        <div class="login-header">
            <img src="JNTUH_logo.png" alt="College Logo">
            <h2>Login details</h2>
        </div>
<!-- 
        <label>Department</label>
        <input type="text" placeholder="Enter Department"> -->

        <label>ID number</label>
        <input type="text" placeholder="Enter Id number">

        <label>Phone number</label>
        <input type="text" placeholder="ENter phone number">

        <label>Password</label>

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">
            <span onclick="togglePassword()" class="show-btn">Show</span>
        </div>

            <!-- RULES -->
        <div class="password-rules">
            <p id="length">• At least 8 characters</p>
            <p id="upper">• One uppercase letter</p>
            <p id="number">• One number</p>
            <p id="special">• One special character</p>
        </div>

        <button onclick="validatePassword()">Login</button>



    </div>

<script src="script.js"></script>
    
</body>
</html>
