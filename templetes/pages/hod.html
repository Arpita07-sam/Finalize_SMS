<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD details</title>
    <style>
        body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

.container {
    display: flex;
    height: 100vh;
}

/* LEFT */
.left-panel {
    width: 35%;
    height: 70%;
    background: #2c3e50;
    color: white;
    padding: 20px;
}

.left-panel input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: none;
}

.left-panel button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: #1abc9c;
    border: none;
    color: white;
    cursor: pointer;
}

/* RIGHT */
.right-panel {
    width: 65%;
    padding: 20px;
}

.image-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.image-box {
    position: relative;
}

.image-box img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

/* REMOVE BUTTON */
.remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    width: 20px;
    height: 20px;
    font-size: 12px;
}
</style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>Department Details</h2>

            <label>Department Name</label>
            <input type="text" id="deptName" value="Computer Science">

            <label>HOD Name</label>
            <input type="text" id="hodName" value="Dr. Rao">

            <label>Phone Number</label>
            <input type="text" id="phone" value="9876543210">

            <label>Department ID</label>
            <input type="text" id="deptId" value="CSE001">

            <button id="editBtn" onclick="toggleEdit()">Edit</button>
        </div>

        <!-- RIGHT SIDE: IMAGE UPLOAD -->
        <div class="right-panel">
            <h2>Upload Department Images</h2>

            <!-- <input type="file" id="imageUpload" multiple accept="image/*"> -->

            <p>You can upload 15-20 images</p>

            <div class="image-preview" id="preview"></div>
                <div class="image-uploader-grid">
                <div id="image-list" class="image-list-container"></div>

                <label class="add-image-btn">
                    <span>+</span>
                    <input type="file" id="multi-upload" accept="image/*" multiple onchange="handleMultipleUpload(event)">
                </label>
            </div>
        </div>
    </div>
    
<script>

let editMode = false;

function toggleEdit() {
    const inputs = document.querySelectorAll(".left-panel input");
    const btn = document.getElementById("editBtn");

    editMode = !editMode;

    inputs.forEach(input => {
        input.disabled = !editMode;
    });

    if (editMode) {
        btn.innerText = "Save";
    } else {
        btn.innerText = "Edit";

        alert("Details saved successfully!");
    }
}


// IMAGE UPLOAD + PREVIEW + REMOVE
const upload = document.getElementById("imageUpload");
const preview = document.getElementById("preview");

let images = [];

upload.addEventListener("change", (event) => {
    const files = Array.from(event.target.files);

    if (images.length + files.length > 20) {
        alert("Maximum 20 images allowed");
        return;
    }

    files.forEach(file => {
        const reader = new FileReader();

        reader.onload = (e) => {
            const imgSrc = e.target.result;
            images.push(imgSrc);
            displayImages();
        };

        reader.readAsDataURL(file);
    });
});


function displayImages() {
    preview.innerHTML = "";

    images.forEach((src, index) => {
        const div = document.createElement("div");
        div.classList.add("image-box");

        const img = document.createElement("img");
        img.src = src;

        const btn = document.createElement("button");
        btn.innerText = "×";
        btn.classList.add("remove-btn");

        btn.onclick = () => {
            images.splice(index, 1);
            displayImages();
        };

        div.appendChild(img);
        div.appendChild(btn);
        preview.appendChild(div);
    });
}

</script>
    
</body>
</html>
